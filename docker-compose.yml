services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=veritas
      - POSTGRES_PASSWORD=veritas
      - POSTGRES_DB=veritas
    ports:
      - "5432:5432"
    volumes:
      - veritas-db:/var/lib/postgresql/data
    networks:
      - veritas-net

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - ELECTION_SERVICE_URL=http://election-service:3001
      - IDENTITY_SERVICE_URL=http://identity-service:3002
      - ZK_PROOF_SERVICE_URL=http://zk-proof-service:3003
      - TALLY_SERVICE_URL=http://tally-service:3004
      - STELLAR_SERVICE_URL=http://stellar-service:3005
    depends_on:
      - election-service
      - identity-service
      - zk-proof-service
      - tally-service
      - stellar-service
    networks:
      - veritas-net

  election-service:
    build:
      context: .
      dockerfile: services/election-service/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://veritas:veritas@db:5432/veritas
      - STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
      - STELLAR_SOROBAN_RPC_URL=https://soroban-testnet.stellar.org
      - STELLAR_NETWORK_PASSPHRASE=Test SDF Network ; September 2015
    depends_on:
      - db
    networks:
      - veritas-net

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL=postgresql://veritas:veritas@db:5432/veritas
      - STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
      - MONEYGRAM_SIGNING_KEY=${MONEYGRAM_SIGNING_KEY}
      - CIRCLE_SIGNING_KEY=${CIRCLE_SIGNING_KEY}
      - STELLAR_ANCHOR_SIGNING_KEY=${STELLAR_ANCHOR_SIGNING_KEY}
    depends_on:
      - db
    networks:
      - veritas-net

  zk-proof-service:
    build:
      context: .
      dockerfile: services/zk-proof-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - PROVER_WASM_PATH=/app/prover/vote_circuit.wasm
      - PROVER_KEY_PATH=/app/prover/proving_key.bin
    networks:
      - veritas-net

  tally-service:
    build:
      context: .
      dockerfile: services/tally-service/Dockerfile
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DATABASE_URL=postgresql://veritas:veritas@db:5432/veritas
      - STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
      - STELLAR_SOROBAN_RPC_URL=https://soroban-testnet.stellar.org
      - THRESHOLD_M=3
      - THRESHOLD_N=5
    depends_on:
      - db
    networks:
      - veritas-net

  stellar-service:
    build:
      context: .
      dockerfile: services/stellar-service/Dockerfile
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3005
      - STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
      - STELLAR_SOROBAN_RPC_URL=https://soroban-testnet.stellar.org
      - STELLAR_NETWORK_PASSPHRASE=Test SDF Network ; September 2015
    networks:
      - veritas-net

networks:
  veritas-net:
    driver: bridge

volumes:
  veritas-db:
