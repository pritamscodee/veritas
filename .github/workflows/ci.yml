name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  frontend-backend:
    name: Lint, typecheck & build (Node)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:shared

      - name: Lint & typecheck all workspaces
        run: npm run lint

      - name: Build all workspaces
        run: npm run build

      - name: Test
        run: npm run test --if-present

  contracts:
    name: Contract format check (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Soroban contract formatting
        working-directory: contracts
        run: cargo fmt --all -- --check

  docker-build:
    name: Docker build (backend images)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - election-service
          - identity-service
          - zk-proof-service
          - tally-service
          - stellar-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/veritas-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
