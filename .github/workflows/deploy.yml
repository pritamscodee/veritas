name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ----------------------------------------------------------------
  # Frontend -> Vercel
  # ----------------------------------------------------------------
  frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"

  # ----------------------------------------------------------------
  # Backend -> Docker images on GHCR, then trigger Render deploy
  # ----------------------------------------------------------------
  backend:
    name: Deploy backend (Docker + Render)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - election-service
          - identity-service
          - zk-proof-service
          - tally-service
          - stellar-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/veritas-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-render:
    name: Trigger Render deploy
    needs: backend
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
    steps:
      - name: Render deploy hook
        run: curl -fsSL "${{ secrets.RENDER_DEPLOY_HOOK }}"
